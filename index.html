<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory</title>
    <style>
        body { font-family: sans-serif; max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
        h1 { margin-bottom: 1.5rem; }
        nav { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 2rem; }
        nav button {
            padding: 0.4rem 0.9rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #f5f5f5;
            cursor: pointer;
        }
        nav button.active { background: #0078d4; color: #fff; border-color: #0078d4; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid #ddd; }
        th { background: #f0f0f0; }
        #status { color: #666; }
    </style>
</head>
<body>
    <h1>Inventory</h1>
    <p><a href="https://salvius.github.io/inventory/index.json">https://salvius.github.io/inventory/index.json</a></p>
    <nav id="nav"></nav>
    <div id="status">Loading...</div>
    <table id="table" hidden>
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
    </table>

    <script>
        const nav = document.getElementById('nav');
        const status = document.getElementById('status');
        const table = document.getElementById('table');
        const thead = document.getElementById('thead');
        const tbody = document.getElementById('tbody');

        let activeBtn = null;

        fetch('index.json')
            .then(r => r.json())
            .then(({ categories }) => {
                status.textContent = '';
                categories.forEach(cat => {
                    const btn = document.createElement('button');
                    btn.textContent = cat.name;
                    btn.addEventListener('click', () => loadCategory(cat, btn));
                    nav.appendChild(btn);
                });
                if (categories.length) loadCategory(categories[0], nav.firstChild);
            })
            .catch(() => { status.textContent = 'Failed to load index.json'; });

        function loadCategory(cat, btn) {
            if (activeBtn) activeBtn.classList.remove('active');
            activeBtn = btn;
            btn.classList.add('active');
            status.textContent = 'Loading...';
            table.hidden = true;

            fetch(cat.file)
                .then(r => r.json())
                .then(items => {
                    if (!items.length) { status.textContent = 'No items.'; return; }
                    const keys = [...new Set(items.flatMap(Object.keys))];
                    thead.innerHTML = '<tr>' + keys.map(k =>
                        `<th>${k.charAt(0).toUpperCase() + k.slice(1)}</th>`).join('') + '</tr>';
                    tbody.innerHTML = items.map(item =>
                        '<tr>' + keys.map(k => {
                            const val = item[k] ?? '';
                            try { new URL(val); return `<td><a href="${val}" target="_blank" rel="noopener noreferrer">${val}</a></td>`; }
                            catch { return `<td>${val}</td>`; }
                        }).join('') + '</tr>'
                    ).join('');
                    status.textContent = '';
                    table.hidden = false;
                })
                .catch(() => { status.textContent = `Failed to load ${cat.file}`; });
        }
    </script>
</body>
</html>
